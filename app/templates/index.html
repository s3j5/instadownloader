<!DOCTYPE html>
<html>
<head>
    <title>InstaSaveX</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="/static/favicon.ico">
</head>
<body>

<div class="main">

    <div class="card">

        <div class="logo">
           <img src="/static/logo.svg" alt="InstaSaveX Logo">
           <!-- <h1>InstaSaveX</h1> -->
        </div>
        <p class="tagline">Download Instagram Reels in Seconds ⚡</p>

        <div class="input-box">
            <input type="text" id="url" placeholder="Paste Instagram link here...">
        </div>

        <div class="btn-group">
            <button class="video-btn" onclick="downloadInsta()">📽️ Video</button>
            <button class="audio-btn" onclick="downloadAudio()">🎵 Audio</button>
        </div>

        <div id="result"></div>

    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
