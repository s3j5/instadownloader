<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f58529;stop-opacity:1"></stop>
      <stop offset="50%" style="stop-color:#dd2a7b;stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#8134af;stop-opacity:1"></stop>
    </linearGradient>
  </defs>

  <!-- Icon -->
  <rect x="10" y="20" width="80" height="80" rx="20" fill="url(#grad)"></rect>
  <circle cx="50" cy="60" r="18" fill="white"></circle>
  <circle cx="70" cy="40" r="5" fill="white"></circle>

  <!-- Download Arrow -->
  <line x1="50" y1="45" x2="50" y2="75" stroke="#8134af" stroke-width="4"></line>
  <polygon points="40,65 50,80 60,65" fill="#8134af"></polygon>

  <!-- Text -->
  <text x="110" y="70" font-family="Arial, sans-serif" font-size="40" fill="#333">
    insta<tspan fill="#dd2a7b">savex</tspan>
